name: NSE Daily Data Scrape

on:
  # Run T+1 morning at 08:00 IST = 02:30 UTC, Tue–Sat (covers Mon–Fri
  # trading days). Post-close runs caught only partial short-deals /
  # bulk-deals / block-deals reports — NSE finalises those overnight, so
  # we wait until the morning after to fetch the complete day's data.
  schedule:
    - cron: "30 2 * * 2-6"   # Tue–Sat 02:30 UTC = 08:00 IST

  # Allow manual trigger with optional dataset selection
  workflow_dispatch:
    inputs:
      datasets:
        description: "Space-separated datasets (blank = all): asm gsm t2t pit bulk_deals block_deals"
        required: false
        default: ""

env:
  PYTHON_VERSION: "3.11"

jobs:
  scrape:
    name: Scrape NSE datasets
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily scrape
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          if [ -n "${{ github.event.inputs.datasets }}" ]; then
            python main.py --datasets ${{ github.event.inputs.datasets }}
          else
            python main.py
          fi

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: scrape-logs-${{ github.run_id }}
          path: "*.log"
          retention-days: 7
