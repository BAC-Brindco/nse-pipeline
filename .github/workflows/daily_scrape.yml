name: NSE Daily Data Scrape

on:
  # Why three triggers instead of one:
  # NSE finalises daily large-deals reports overnight (T → T+1 ~05:00 IST),
  # and GitHub Actions has been delaying our scheduled runs by ~6–7 hours on
  # this repo (cron `0 11` was firing at ~17:30 UTC, not 11:00 UTC). To
  # guarantee at least one run lands on the finalised report each trading
  # day, we fire three times across T+1. Upserts are idempotent on
  # (deal_date, symbol) — re-runs only fill missing rows, never duplicate.
  schedule:
    - cron: "30 18 * * 1-5"  # T 18:30 UTC / T+1 00:00 IST scheduled — earliest catch
    - cron: "30 2 * * 2-6"   # T+1 02:30 UTC / T+1 08:00 IST scheduled — mid-morning catch
    - cron: "30 8 * * 2-6"   # T+1 08:30 UTC / T+1 14:00 IST scheduled — afternoon fallback

  # Allow manual trigger with optional dataset selection
  workflow_dispatch:
    inputs:
      datasets:
        description: "Space-separated datasets (blank = all): asm gsm t2t pit bulk_deals block_deals"
        required: false
        default: ""

env:
  PYTHON_VERSION: "3.11"

jobs:
  scrape:
    name: Scrape NSE datasets
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily scrape
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          if [ -n "${{ github.event.inputs.datasets }}" ]; then
            python main.py --datasets ${{ github.event.inputs.datasets }}
          else
            python main.py
          fi

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: scrape-logs-${{ github.run_id }}
          path: "*.log"
          retention-days: 7
